workflows:
  android-capacitor-workflow:
    name: Android Capacitor APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android_signing
      vars:
        PACKAGE_NAME: "com.somnia.ai.health"
      node: latest
    scripts:
      - name: Build Android App (APK) Direct
        script: | 
          cd android && ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/*/.apk
